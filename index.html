<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机动效评分实验</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
        }
        
        .progress-container {
            background: #f0f0f0;
            border-radius: 10px;
            height: 30px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        
        .current-task {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        
        .current-task h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 10px;
        }
        
        .current-task .task-name {
            color: #667eea;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .current-task .instruction {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #dee2e6;
        }
        
        .completed {
            text-align: center;
            padding: 40px 20px;
        }
        
        .completed h2 {
            color: #28a745;
            font-size: 32px;
            margin-bottom: 15px;
        }
        
        .completed p {
            color: #666;
            font-size: 18px;
            line-height: 1.8;
        }
        
        .checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: #28a745;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: white;
        }
        
        .task-list {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .task-list h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: white;
            border-radius: 6px;
        }
        
        .task-item.completed {
            background: #d4edda;
            padding: 10px;
        }
        
        .task-item.current {
            background: #cfe2ff;
            border: 2px solid #667eea;
            padding: 8px;
        }
        
        .task-number {
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            font-size: 14px;
        }
        
        .task-item.completed .task-number {
            background: #28a745;
        }
        
        .task-item.current .task-number {
            background: #0d6efd;
        }
        
        .task-name-small {
            flex: 1;
            color: #333;
            font-size: 14px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        
        .modal-content h3 {
            color: #333;
            font-size: 22px;
            margin-bottom: 15px;
        }
        
        .modal-content p {
            color: #666;
            font-size: 16px;
            margin-bottom: 25px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>手机动效评分实验</h1>
            <p>请依次完成10个场景的评分任务</p>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar">0/10</div>
        </div>
        
        <div id="taskContent">
            <!-- 动态内容将在这里显示 -->
        </div>
        
        <div class="task-list">
            <h3>任务列表</h3>
            <div id="taskListContent">
                <!-- 任务列表将在这里显示 -->
            </div>
        </div>
    </div>
    
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <h3>确认跳转</h3>
            <p id="modalMessage">确定要前往问卷填写吗？填写完成后请返回此页面继续下一个任务。</p>
            <div class="button-group">
                <button class="btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn-primary" onclick="confirmGo()">确定</button>
            </div>
        </div>
    </div>

    <script>
        // 10个任务的配置
        const tasks = [
            { id: 1, name: "上滑进入多任务", url: "https://v.wjx.cn/vm/OnvZ2jP.aspx# " },
            { id: 2, name: "控制中心-滑动音量条到最大", url: "https://v.wjx.cn/vm/OnvZ2jP.aspx# " },
            { id: 3, name: "滑动时钟选择器", url: "https://v.wjx.cn/vm/OnvZ2jP.aspx# " },
            { id: 4, name: "水平仪达到0°", url: "https://v.wjx.cn/vm/OnvZ2jP.aspx# " },
            { id: 5, name: "长按卡片/图标/文件夹", url: "https://v.wjx.cn/vm/OnvZ2jP.aspx# " },
            { id: 6, name: "控制中心返回", url: "https://v.wjx.cn/vm/OnvZ2jP.aspx# " },
            { id: 7, name: "拨号键盘输入", url: "https://v.wjx.cn/vm/OnvZ2jP.aspx# " },
            { id: 8, name: "传输(发出)成功", url: "https://v.wjx.cn/vm/OnvZ2jP.aspx# " },
            { id: 9, name: "锁屏-密码解锁失败", url: "https://v.wjx.cn/vm/OnvZ2jP.aspx# " },
            { id: 10, name: "无后台进入多任务", url: "https://v.wjx.cn/vm/OnvZ2jP.aspx# " }
        ];
        
        let currentTaskIndex = 0;
        let completedTasks = [];
        let pendingUrl = "";
        
        // 从localStorage加载进度
        function loadProgress() {
            const saved = localStorage.getItem('questionnaire_progress');
            if (saved) {
                const data = JSON.parse(saved);
                currentTaskIndex = data.currentTaskIndex || 0;
                completedTasks = data.completedTasks || [];
            }
        }
        
        // 保存进度到localStorage
        function saveProgress() {
            const data = {
                currentTaskIndex: currentTaskIndex,
                completedTasks: completedTasks
            };
            localStorage.setItem('questionnaire_progress', JSON.stringify(data));
        }
        
        // 更新进度条
        function updateProgress() {
            const progress = (completedTasks.length / tasks.length) * 100;
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = progress + '%';
            progressBar.textContent = completedTasks.length + '/' + tasks.length;
        }
        
        // 渲染任务列表
        function renderTaskList() {
            const listContent = document.getElementById('taskListContent');
            listContent.innerHTML = '';
            
            tasks.forEach((task, index) => {
                const div = document.createElement('div');
                div.className = 'task-item';
                
                if (completedTasks.includes(task.id)) {
                    div.classList.add('completed');
                } else if (index === currentTaskIndex) {
                    div.classList.add('current');
                }
                
                div.innerHTML = `
                    <div class="task-number">${task.id}</div>
                    <div class="task-name-small">${task.name}</div>
                `;
                
                listContent.appendChild(div);
            });
        }
        
        // 渲染当前任务
        function renderCurrentTask() {
            const taskContent = document.getElementById('taskContent');
            
            if (currentTaskIndex >= tasks.length) {
                // 所有任务完成
                taskContent.innerHTML = `
                    <div class="completed">
                        <div class="checkmark">✓</div>
                        <h2>恭喜！所有任务已完成</h2>
                        <p>感谢您的参与！<br>您已完成全部10个场景的评分任务。</p>
                        <button class="btn-primary" onclick="resetProgress()" style="margin-top: 20px;">重新开始</button>
                    </div>
                `;
                return;
            }
            
            const task = tasks[currentTaskIndex];
            taskContent.innerHTML = `
                <div class="current-task">
                    <h2>当前任务 ${task.id}/10</h2>
                    <div class="task-name">${task.name}</div>
                    <div class="instruction">
                        请点击下方按钮前往问卷填写本场景的评分。<br>
                        填写完成后，请返回此页面继续下一个任务。
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn-secondary" onclick="skipTask()">跳过</button>
                    <button class="btn-primary" onclick="openQuestionnaire()">开始评分</button>
                </div>
            `;
        }
        
        // 打开问卷
        function openQuestionnaire() {
            const task = tasks[currentTaskIndex];
            
            if (!task.url || task.url === "") {
                alert('问卷链接尚未配置！\n\n请在代码中填写对应的问卷URL。');
                return;
            }
            
            pendingUrl = task.url;
            document.getElementById('modalMessage').textContent = 
                `确定要前往评分「${task.name}」吗？填写完成后请返回此页面继续下一个任务。`;
            document.getElementById('confirmModal').classList.add('active');
        }
        
        // 关闭模态框
        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }
        
        // 确认前往
        function confirmGo() {
            closeModal();
            window.open(pendingUrl, '_blank');
            
            // 延迟3秒后询问是否完成
            setTimeout(() => {
                if (confirm('您已完成这个场景的评分了吗？\n\n点击"确定"进入下一个任务\n点击"取消"稍后再确认')) {
                    completeTask();
                }
            }, 3000);
        }
        
        // 完成当前任务
        function completeTask() {
            const task = tasks[currentTaskIndex];
            if (!completedTasks.includes(task.id)) {
                completedTasks.push(task.id);
            }
            currentTaskIndex++;
            saveProgress();
            updateProgress();
            renderTaskList();
            renderCurrentTask();
        }
        
        // 跳过任务
        function skipTask() {
            if (confirm('确定要跳过当前任务吗？\n您可以稍后再回来完成。')) {
                currentTaskIndex++;
                saveProgress();
                updateProgress();
                renderTaskList();
                renderCurrentTask();
            }
        }
        
        // 重置进度
        function resetProgress() {
            if (confirm('确定要重置所有进度吗？\n这将清除您的所有完成记录。')) {
                localStorage.removeItem('questionnaire_progress');
                currentTaskIndex = 0;
                completedTasks = [];
                saveProgress();
                updateProgress();
                renderTaskList();
                renderCurrentTask();
            }
        }
        
        // 页面加载时初始化
        window.onload = function() {
            loadProgress();
            updateProgress();
            renderTaskList();
            renderCurrentTask();
        };
    </script>
</body>
</html>
